name: Build Binaries

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Build Windows x64
      run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o fs_index_win_x64.exe fs_index.go
    
    - name: Build Windows x86
      run: GOOS=windows GOARCH=386 go build -ldflags="-s -w" -o fs_index_win_x86.exe fs_index.go
    
    - name: Build Linux x64
      run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o fs_index_linux_x64 fs_index.go
    
    - name: Build Linux ARM64
      run: GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o fs_index_linux_arm64 fs_index.go
    
    - name: Build Mac x64
      run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o fs_index_mac_x64 fs_index.go
    
    - name: Build Mac ARM64
      run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o fs_index_mac_arm64 fs_index.go
    
    - name: Generate version
      id: version
      run: echo "version=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: fs_index_*
        tag_name: v${{ steps.version.outputs.version }}
        name: Build ${{ steps.version.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}